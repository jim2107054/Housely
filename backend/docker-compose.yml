version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: housely-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: housely
      POSTGRES_PASSWORD: housely123
      POSTGRES_DB: housely
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
