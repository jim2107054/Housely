version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: housely-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: housely
      POSTGRES_PASSWORD: housely123
      POSTGRES_DB: housely
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - housely-network

  redis:
    image: redis:7-alpine
    container_name: housely-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    networks:
      - housely-network

volumes:
  pgdata:
  redisdata:

networks:
  housely-network:
    driver: bridge
